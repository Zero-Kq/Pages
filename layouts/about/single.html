{{- define "main" }}

<article class="post-single about-page">
    <style>
    .about-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - var(--header-height) - 100px);
    }
    .about-page .post-header {
        display: none !important;
    }
    .about-page .post-content {
        text-align: center;
        border: none !important;
    }

    /* 社交图标样式 */
    .about-page .social-icons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }

    .about-page .social-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        background: var(--tertiary);
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        min-width: 200px;
        position: relative;
        overflow: hidden;
    }

    .about-page .social-item:hover {
        background: var(--secondary);
        border-color: var(--primary);
        transform: translateX(4px);
    }

    .about-page .social-item .icon-box {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: var(--theme);
        border-radius: 8px;
    }

    .about-page .social-item .icon-box svg {
        width: 20px;
        height: 20px;
        fill: var(--primary);
    }

    .about-page .social-item .label {
        color: var(--primary);
        font-size: 14px;
        font-weight: 500;
        position: relative;
        z-index: 2;
    }
    </style>

    <div class="post-content">
        <div class="social-icons">
