{{- /* JavaScript to prevent TOC clicks from adding to browser history and changing URL */ -}}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const tocLinks = document.querySelectorAll('.toc a, .toc-nav a, #TableOfContents a');
    tocLinks.forEach(function (link) {
        link.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation(); // Prevent PaperMod's native script from pushing history
            
            const targetId = this.getAttribute('href');
            if (targetId && targetId.startsWith('#')) {
                // Find the target element, decode URI for Chinese headings
                const id = decodeURI(targetId.substring(1));
                const targetElement = document.getElementById(id);
                if (targetElement) {
                    // Scroll smoothly with an offset for the top navigation bar
                    const yOffset = -70; 
                    const y = targetElement.getBoundingClientRect().top + window.pageYOffset + yOffset;
                    window.scrollTo({top: y, behavior: 'smooth'});
                }
            }
        }, { capture: true }); // Use capture phase to intercept before PaperMod's bubble phase listener
    });
});
</script>

{{ if hugo.IsServer }}
<!-- Run Shiki directly in browser during local development -->
<script type="module">
  import { createHighlighter } from 'https://esm.sh/shiki@1.0.0';
  
  async function highlight() {
    const highlighter = await createHighlighter({
        themes: ['dark-plus'],
        langs: ['cpp', 'bash', 'yaml', 'json', 'python', 'go', 'javascript', 'html', 'css', 'shell']
    });
    
    document.querySelectorAll('.highlight code[data-lang]').forEach(el => {
      let lang = el.getAttribute('data-lang');
      if (lang === 'sh') lang = 'shell';
      let text = el.textContent;
      if (text.endsWith('\n')) text = text.slice(0, -1);
      
      const html = highlighter.codeToHtml(text, { lang, theme: 'dark-plus' });
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const innerCode = temp.querySelector('code');
      if (innerCode) {
          el.innerHTML = innerCode.innerHTML;
      }
    });
  }
  highlight().catch(console.error);
</script>
{{ end }}
