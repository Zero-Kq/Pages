name: Deploy Hugo PaperMod Site to Pages

on:
  push:
    paths-ignore:
      - "images/**"
      - "LICENSE"
      - "README.md"
    branches:
      - main  # 触发分支改为你的 main 分支
  workflow_dispatch:
    # 手动触发时可指定 Hugo 版本
    inputs:
      hugoVersion:
        description: "Hugo Version"
        required: false
        default: "0.146.0"

# 并发控制：同一时间只允许一个部署任务
concurrency:
  group: "pages"
  cancel-in-progress: true

# 默认使用 bash 执行命令
defaults:
  run:
    shell: bash

jobs:
  # 构建站点
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      # 优先使用手动输入的 Hugo 版本，否则用默认 0.146.0
      HUGO_VERSION: ${{ github.event.inputs.hugoVersion || '0.146.0' }}
    steps:
      # 安装 Hugo CLI
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # 拉取你仓库的代码（默认拉取触发分支，即 main）
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 若你的 PaperMod 主题是通过 git 子模块引入的，需添加下面这行
          # submodules: true
          fetch-depth: 0  # 拉取完整提交历史（避免 Hugo 构建时缺少信息）

      # 初始化并更新 PaperMod 主题（二选一，根据你的引入方式）
      # 方式1：若你用子模块引入 PaperMod（推荐）
      - name: Update PaperMod Theme (Submodule)
        run: |
          git submodule update --init --recursive
          git submodule update --remote --merge
      # 方式2：若你未用子模块，直接克隆 PaperMod 到 themes 目录（取消注释使用）
      # - name: Clone PaperMod Theme
      #   run: |
      #     git clone https://github.com/adityatelange/hugo-PaperMod.git themes/PaperMod

      # 配置 GitHub Pages 环境
      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      # 构建 Hugo 站点
      - name: Build Site with Hugo
        run: |
          hugo \
            --buildDrafts --gc \
            --baseURL ${{ steps.pages.outputs.base_url }}

      # 上传构建产物（public 目录）
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署到 gh-pages 分支
  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build  # 依赖 build 任务完成
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4