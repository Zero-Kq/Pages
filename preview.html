<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - 预览</title>
    <style>
        :root {
            --gap: 24px;
            --header-height: 60px;
            --radius: 8px;
            --theme: rgb(255, 255, 255);
            --entry: rgb(255, 255, 255);
            --primary: rgb(30, 30, 30);
            --secondary: rgb(108, 108, 108);
            --tertiary: rgb(214, 214, 214);
            --border: rgb(238, 238, 238);
            color-scheme: light;
        }

        [data-theme="dark"] {
            --theme: rgb(29, 30, 32);
            --entry: rgb(46, 46, 51);
            --primary: rgb(218, 218, 219);
            --secondary: rgb(155, 156, 157);
            --tertiary: rgb(65, 66, 68);
            --border: rgb(51, 51, 51);
            color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--tertiary);
            color: var(--primary);
            line-height: 1.6;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--gap);
        }

        .page-header {
            margin-bottom: var(--gap);
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .terms-page-wrapper {
            display: flex;
            gap: var(--gap);
            align-items: flex-start;
        }

        .terms-main {
            flex: 1;
            min-width: 0;
        }

        /* 左侧分类卡片 */
        .terms-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--gap);
        }

        .term-card {
            position: relative;
            display: flex;
            flex-direction: column;
            padding: var(--gap);
            background: var(--entry);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: transform 0.1s;
        }

        .term-card:hover {
            border-color: var(--primary);
        }

        .term-card:active {
            transform: scale(0.96);
        }

        .term-link {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
        }

        .term-title {
            font-size: 22px;
            line-height: 1.3;
            margin: 0;
            color: var(--primary);
        }

        .term-count {
            margin-top: 8px;
            color: var(--secondary);
            font-size: 14px;
        }

        /* 右侧侧边栏 */
        .terms-sidebar {
            width: 220px;
            flex-shrink: 0;
            position: sticky;
            top: calc(var(--header-height) + var(--gap));
            max-height: calc(100vh - var(--header-height) - var(--gap) * 2);
            overflow-y: auto;
            padding: var(--gap);
            background: var(--entry);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: var(--primary);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sidebar-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            font-size: 13px;
            background: var(--tertiary);
            color: var(--primary);
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .sidebar-tag:hover {
            background: var(--primary);
            color: var(--theme);
        }

        .sidebar-tag:active {
            transform: scale(0.95);
        }

        .tag-count {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: var(--entry);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            color: var(--primary);
        }

        @media (max-width: 900px) {
            .terms-page-wrapper {
                flex-direction: column;
            }

            .terms-sidebar {
                width: 100%;
                position: static;
                max-height: none;
                order: -1;
            }

            .sidebar-tags {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">切换主题</button>

    <main class="main">
        <header class="page-header">
            <h1>Categories</h1>
        </header>

        <div class="terms-page-wrapper">
            <!-- 左侧：Categories 分类卡片 -->
            <div class="terms-main">
                <div class="terms-cards">
                    <article class="term-card">
                        <a class="term-link" href="#hugo"></a>
                        <h2 class="term-title">Hugo</h2>
                        <div class="term-count">3 篇文章</div>
                    </article>
                    <article class="term-card">
                        <a class="term-link" href="#gtsam"></a>
                        <h2 class="term-title">Gtsam</h2>
                        <div class="term-count">5 篇文章</div>
                    </article>
                    <article class="term-card">
                        <a class="term-link" href="#algorithm"></a>
                        <h2 class="term-title">Algorithm</h2>
                        <div class="term-count">2 篇文章</div>
                    </article>
                    <article class="term-card">
                        <a class="term-link" href="#cpp"></a>
                        <h2 class="term-title">C++</h2>
                        <div class="term-count">8 篇文章</div>
                    </article>
                </div>
            </div>

            <!-- 右侧：Tags 标签侧边栏 -->
            <aside class="terms-sidebar">
                <h3 class="sidebar-title">Tags</h3>
                <div class="sidebar-tags">
                    <a href="#tag-hugo" class="sidebar-tag">hugo <span class="tag-count">3</span></a>
                    <a href="#tag教程" class="sidebar-tag">教程 <span class="tag-count">5</span></a>
                    <a href="#tag配置" class="sidebar-tag">配置 <span class="tag-count">2</span></a>
                    <a href="#tag优化" class="sidebar-tag">优化 <span class="tag-count">4</span></a>
                    <a href="#tag机器人" class="sidebar-tag">机器人 <span class="tag-count">1</span></a>
                    <a href="#tag slam" class="sidebar-tag">slam <span class="tag-count">3</span></a>
                    <a href="#tag笔记" class="sidebar-tag">笔记 <span class="tag-count">8</span></a>
                    <a href="#tag学习" class="sidebar-tag">学习 <span class="tag-count">6</span></a>
                    <a href="#tag论文" class="sidebar-tag">论文 <span class="tag-count">2</span></a>
                    <a href="#tag工具" class="sidebar-tag">工具 <span class="tag-count">7</span></a>
                </div>
            </aside>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
